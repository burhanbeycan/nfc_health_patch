version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nfc_health_patch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend_api
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nfc_health_patch
      SECRET_KEY: change-me
    ports:
      - "8000:8000"
    depends_on:
      - db

  portal:
    build: ./clinician_portal
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
